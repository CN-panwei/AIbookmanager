<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookManager - 本地图书管理</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Toast UI Editor -->
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/3.2.2/toastui-editor.min.css">
    <script src="https://uicdn.toast.com/editor/3.2.2/toastui-editor-all.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="/static/images/logo.png" alt="BookManager" class="sidebar-logo">
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item active" data-category="all" onclick="selectCategory(null)">
                    <img src="/static/icon/home.svg" class="nav-icon" alt="">
                    <span class="nav-label">全部图书</span>
                    <span class="nav-count" id="nav-count-all"></span>
                </div>
                <div class="nav-divider"></div>
                <div id="category-list"></div>
                <button class="btn-add-category" onclick="showNewCategoryModal()">
                    <span>+</span> 新建分类
                </button>
            </nav>
            <div class="sidebar-footer">
                <a href="https://pettoai.cn" target="_blank" rel="noopener noreferrer" class="footer-logo-link">
                    <img src="/static/images/logo.png" alt="PettoAI" class="footer-logo">
                </a>
                <a href="https://pettoai.cn" target="_blank" rel="noopener noreferrer" class="footer-url">PettoAi.cn</a>
                <span class="footer-version" id="app-version"></span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <header class="top-bar">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索书名、作者..." oninput="handleSearch()">
                </div>
                <div class="top-actions">
                    <button class="btn-icon" onclick="showUploadModal()" title="上传图书"><img src="/static/icon/upload.svg" alt=""></button>
                    <button class="btn-icon" onclick="showSettingsModal()" title="设置"><img src="/static/icon/setting.svg" alt=""></button>
                </div>
            </header>

            <div class="content">
                <div class="section-header">
                    <h2 id="section-title">全部图书</h2>
                    <span id="book-count" class="count-badge">0 本</span>
                </div>
                <div id="book-grid" class="book-grid"></div>
            </div>
        </main>
    </div>

    <!-- Book Detail Modal -->
    <div id="book-modal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-large">
            <button class="modal-close" onclick="closeBookModal()">&times;</button>
            <div class="book-detail">
                <div class="book-detail-left">
                    <img id="detail-cover" src="" alt="封面" class="detail-cover">
                    <div class="detail-meta">
                        <h3 id="detail-title"></h3>
                        <p id="detail-author" class="detail-author"></p>
                        <div class="detail-info">
                            <span id="detail-format" class="badge"></span>
                            <span id="detail-pages"></span>
                        </div>
                        <div class="detail-actions">
                            <button class="btn-primary" onclick="generateSummary()"><img src="/static/icon/sparkle.svg" class="icon-svg" alt="">生成简介</button>
                            <button class="btn-secondary" onclick="deleteBook()"><img src="/static/icon/trash.svg" class="icon-svg" alt="">删除</button>
                        </div>
                    </div>
                    <div class="detail-description">
                        <h4>简介</h4>
                        <p id="detail-desc">暂无简介</p>
                    </div>
                </div>
                <div class="book-detail-right">
                    <div class="notes-header" id="notes-header">
                        <h4><img src="/static/icon/note.svg" class="icon-svg title" alt="">笔记</h4>
                        <div class="notes-header-actions">
                            <button class="btn-small" onclick="toggleBatchMode()">批量管理</button>
                            <button class="btn-small" onclick="showNoteEditor()">+ 新建笔记</button>
                        </div>
                    </div>
                    <div id="notes-list" class="notes-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Note Editor Modal -->
    <div id="note-modal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-medium">
            <button class="modal-close" onclick="closeNoteModal()">&times;</button>
            <div class="note-editor-header">
                <input type="text" id="note-title-input" placeholder="笔记标题" class="note-title-input" autocomplete="off">
                <div class="note-actions">
                    <button class="btn-ai" onclick="showAIPrompt()"><img src="/static/icon/robot.svg" class="icon-svg" alt="">AI 生成</button>
                    <button class="btn-primary" onclick="saveNote()">保存</button>
                </div>
            </div>
            <div id="editor-container"></div>
        </div>
    </div>

    <!-- AI Prompt Modal -->
    <div id="ai-modal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-ai">
            <button class="modal-close" onclick="closeAIModal()">&times;</button>
            <h4><img src="/static/icon/robot.svg" class="icon-svg title" alt="">AI 生成笔记</h4>
            <div class="form-group">
                <label>选择提示词</label>
                <select id="ai-prompt-select" onchange="onPromptSelect()">
                    <option value="">-- 自定义提示词 --</option>
                </select>
            </div>
            <div class="form-group" style="flex:1;display:flex;flex-direction:column;">
                <label>提示词内容（可编辑）</label>
                <textarea id="ai-prompt-input" placeholder="输入或选择提示词后在此编辑..." style="flex:1;min-height:120px;"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeAIModal()">取消</button>
                <button class="btn-primary" onclick="generateNote()">生成</button>
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="upload-modal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-upload">
            <button class="modal-close" onclick="closeUploadModal()">&times;</button>
            <h4><img src="/static/icon/upload.svg" class="icon-svg title" alt="">批量上传图书</h4>
            <div class="form-group">
                <label>选择分类</label>
                <select id="upload-category"></select>
            </div>
            <div class="form-group">
                <label>选择文件（可多选 PDF / EPUB）</label>
                <input type="file" id="upload-file" accept=".pdf,.epub" multiple onchange="onFilesSelected()">
            </div>
            <div id="upload-file-list" class="upload-file-list"></div>
            <div id="upload-dropzone" class="dropzone"
                 ondragover="event.preventDefault();this.classList.add('active')"
                 ondragleave="this.classList.remove('active')"
                 ondrop="handleDrop(event)">
                <p><img src="/static/icon/folder-open.svg" class="icon-svg title" alt="">拖拽文件到此处上传</p>
            </div>
            <div id="upload-progress" class="upload-progress" style="display:none;">
                <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
                <span id="progress-text" class="progress-text"></span>
            </div>
            <div id="upload-result" class="upload-result" style="display:none;"></div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeUploadModal()">取消</button>
                <button class="btn-primary" id="upload-btn" onclick="uploadBooks()">上传</button>
            </div>
        </div>
    </div>

    <!-- Category Modal (New / Edit) -->
    <div id="category-modal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-category">
            <button class="modal-close" onclick="closeCategoryModal()">&times;</button>
            <h4 id="category-modal-title"><img src="/static/icon/folder.svg" class="icon-svg title" alt="">新建分类</h4>
            <input type="hidden" id="edit-category-id" value="">
            <input type="text" id="new-category-name" placeholder="分类名称">
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeCategoryModal()">取消</button>
                <button class="btn-primary" id="category-modal-btn" onclick="handleCategoryModal()">创建</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-settings">
            <button class="modal-close" onclick="closeSettingsModal()">&times;</button>
            <div class="settings-layout">
                <!-- 左侧标签 -->
                <div class="settings-tabs">
                    <div class="settings-tab active" data-tab="api" onclick="switchSettingsTab('api')">
                        <span>API 设置</span>
                    </div>
                    <div class="settings-tab" data-tab="prompts" onclick="switchSettingsTab('prompts')">
                        <span>自定义提示词</span>
                    </div>
                </div>
                <!-- 右侧内容 -->
                <div class="settings-body">
                    <!-- API 设置面板 -->
                    <div id="tab-api" class="settings-panel active">
                        <h4>API 设置</h4>
                        <div class="form-group">
                            <label>DeepSeek API Key</label>
                            <input type="text" id="setting-api-key" placeholder="sk-...">
                        </div>
                        <div class="form-group">
                            <label>API Base URL（可选）</label>
                            <input type="text" id="setting-base-url" placeholder="https://api.deepseek.com/v1">
                        </div>
                        <div class="form-group">
                            <label>模型（可选）</label>
                            <input type="text" id="setting-model" placeholder="deepseek-chat">
                        </div>
                        <div id="test-result" class="test-result"></div>
                        <div class="modal-actions">
                            <button class="btn-secondary" onclick="testAPIKey()">测试连接</button>
                            <button class="btn-primary" onclick="saveSettings()">保存</button>
                        </div>
                    </div>
                    <!-- 自定义提示词面板 -->
                    <div id="tab-prompts" class="settings-panel">
                        <h4>自定义提示词</h4>
                        <p class="hint">在这里管理 AI 生成笔记时使用的提示词模板。</p>
                        <div id="prompts-list" class="prompts-list"></div>
                        <button class="btn-small" onclick="addNewPrompt()" style="margin-top:12px;">+ 新增提示词</button>
                        <div class="modal-actions">
                            <button class="btn-primary" onclick="saveSettings()">保存</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
